# Flood Risk Pipeline — GitHub Actions Workflow
# Runs monthly (or on-demand) and orchestrates the full pipeline:
#   1. Build & push Docker image to GCR
#   2. Trigger Cloud Run job to process data
#   3. Upload outputs to Cloudflare R2

name: Flood Risk Pipeline

on:
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch:
    inputs:
      year:
        description: "Year for rainfall data (e.g. 2024)"
        required: false
        default: "2024"
      month:
        description: "Month for rainfall data (1-12)"
        required: false
        default: "6"

env:
  PROJECT_ID: project-a93d8eb8-d695-49f7-857
  REGION: us-central1
  IMAGE: gcr.io/project-a93d8eb8-d695-49f7-857/flood-risk-pipeline
  JOB_NAME: flood-risk-job
  WORKLOAD_IDENTITY_PROVIDER: projects/244163528833/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  SERVICE_ACCOUNT: github-pipeline@project-a93d8eb8-d695-49f7-857.iam.gserviceaccount.com

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Generate image tag
        id: tag
        run: echo "tag=$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        run: |
          docker build -f docker/Dockerfile -t $IMAGE:${{ steps.tag.outputs.tag }} -t $IMAGE:latest .
          docker push $IMAGE:${{ steps.tag.outputs.tag }}
          docker push $IMAGE:latest

  process:
    name: Process & upload
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Create or update Cloud Run job
        run: |
          gcloud run jobs create $JOB_NAME \
            --image=$IMAGE:latest \
            --region=$REGION \
            --memory=2Gi \
            --cpu=2 \
            --max-retries=1 \
            --task-timeout=30m \
            --set-env-vars="DATA_DIR=/app/data,OUTPUT_DIR=/app/output,GCS_BUCKET=accra-flood-risk" \
            --project=$PROJECT_ID \
          || gcloud run jobs update $JOB_NAME \
            --image=$IMAGE:latest \
            --region=$REGION \
            --project=$PROJECT_ID

      - name: Execute Cloud Run job
        run: |
          gcloud run jobs execute $JOB_NAME \
            --region=$REGION \
            --project=$PROJECT_ID \
            --wait

      - name: Notify on success
        if: success()
        run: echo "✅ Pipeline completed successfully at $(date)" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        run: echo "❌ Pipeline FAILED at $(date). Check Cloud Run logs." >> $GITHUB_STEP_SUMMARY
