# ─────────────────────────────────────────────────────────────────────────────
# Flood Risk Pipeline — GitHub Actions Workflow
#
# Runs automatically on push to main, monthly on schedule, or manually.
# Orchestrates the full pipeline:
#   1. Build & push Docker image to Google Container Registry (GCR)
#   2. Trigger Cloud Run job to process flood risk data
#   3. Upload outputs (COG rasters + GeoJSON) to Google Cloud Storage (GCS)
#
# Required GitHub Repository Variables (Settings → Secrets and variables → Actions → Variables):
#   GCP_PROJECT_ID              – your GCP project ID
#   GCP_PROJECT_NUMBER          – your GCP project number
#   GCP_REGION                  – GCP region (e.g. us-central1)
#   GCS_BUCKET                  – your GCS bucket name
#   WORKLOAD_IDENTITY_PROVIDER  – full path to your WIF provider
#   SERVICE_ACCOUNT             – github-pipeline service account email
#
# No secrets needed — authentication uses Workload Identity Federation.
# ─────────────────────────────────────────────────────────────────────────────

name: Flood Risk Pipeline

on:
  # Run on every push to main
  push:
    branches:
      - main

  # Run on the 1st of every month at 06:00 UTC
  schedule:
    - cron: "0 6 1 * *"

  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      year:
        description: "Year for rainfall data (e.g. 2024)"
        required: false
        default: "2024"
      month:
        description: "Month for rainfall data (1-12)"
        required: false
        default: "6"
      force_download:
        description: "Force re-download of all input data"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  PROJECT_ID:  ${{ vars.GCP_PROJECT_ID }}
  REGION:      ${{ vars.GCP_REGION }}
  GCS_BUCKET:  ${{ vars.GCS_BUCKET }}
  IMAGE:       gcr.io/${{ vars.GCP_PROJECT_ID }}/flood-risk-pipeline
  JOB_NAME:    flood-risk-job
  WORKLOAD_IDENTITY_PROVIDER: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
  SERVICE_ACCOUNT:            ${{ vars.SERVICE_ACCOUNT }}

jobs:
  # ── Job 1: Build and push Docker image to GCR ──────────────────────────────
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Required for Workload Identity Federation

    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to push to GCR
        run: gcloud auth configure-docker --quiet

      - name: Generate image tag from timestamp
        id: tag
        run: echo "tag=$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            -f docker/Dockerfile.pipeline \
            -t $IMAGE:${{ steps.tag.outputs.tag }} \
            -t $IMAGE:latest \
            .

      - name: Push Docker image to GCR
        run: |
          docker push $IMAGE:${{ steps.tag.outputs.tag }}
          docker push $IMAGE:latest

      - name: Log image details
        run: |
          echo "### Image built and pushed" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`$IMAGE:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** \`${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Built at:** $(date -u)" >> $GITHUB_STEP_SUMMARY

  # ── Job 2: Run Cloud Run processing job ────────────────────────────────────
  process:
    name: Process & upload
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write   # Required for Workload Identity Federation

    steps:
      - name: Authenticate to GCP via Workload Identity
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Create or update Cloud Run job
        run: |
          gcloud run jobs create $JOB_NAME \
            --image=$IMAGE:latest \
            --region=$REGION \
            --memory=8Gi \
            --cpu=4 \
            --max-retries=1 \
            --task-timeout=90m \
            --set-env-vars="\
              DATA_DIR=/app/data,\
              OUTPUT_DIR=/app/output,\
              GCS_BUCKET=$GCS_BUCKET,\
              OPENTOPO_API_KEY=${{ vars.OPENTOPO_API_KEY }},\
              EARTHDATA_USER=${{ secrets.EARTHDATA_USER }},\
              EARTHDATA_PASS=${{ secrets.EARTHDATA_PASS }},\
              RAINFALL_YEAR=${{ github.event.inputs.year || '2024' }},\
              RAINFALL_MONTH=${{ github.event.inputs.month || '6' }},\
              BBOX_WEST=-0.60,\
              BBOX_EAST=0.75,\
              BBOX_SOUTH=5.35,\
              BBOX_NORTH=6.20,\
              WEIGHT_DEM=0.30,\
              WEIGHT_RAINFALL=0.25,\
              WEIGHT_SLOPE=0.20,\
              WEIGHT_LANDCOVER=0.15,\
              WEIGHT_WATERBODIES=0.10" \
            --project=$PROJECT_ID \
          || gcloud run jobs update $JOB_NAME \
            --image=$IMAGE:latest \
            --region=$REGION \
            --memory=8Gi \
            --cpu=4 \
            --task-timeout=90m \
            --set-env-vars="\
              DATA_DIR=/app/data,\
              OUTPUT_DIR=/app/output,\
              GCS_BUCKET=$GCS_BUCKET,\
              OPENTOPO_API_KEY=${{ vars.OPENTOPO_API_KEY }},\
              EARTHDATA_USER=${{ secrets.EARTHDATA_USER }},\
              EARTHDATA_PASS=${{ secrets.EARTHDATA_PASS }},\
              RAINFALL_YEAR=${{ github.event.inputs.year || '2024' }},\
              RAINFALL_MONTH=${{ github.event.inputs.month || '6' }},\
              BBOX_WEST=-0.60,\
              BBOX_EAST=0.75,\
              BBOX_SOUTH=5.35,\
              BBOX_NORTH=6.20,\
              WEIGHT_DEM=0.30,\
              WEIGHT_RAINFALL=0.25,\
              WEIGHT_SLOPE=0.20,\
              WEIGHT_LANDCOVER=0.15,\
              WEIGHT_WATERBODIES=0.10" \
            --project=$PROJECT_ID

      - name: Execute Cloud Run job and wait
        run: |
          gcloud run jobs execute $JOB_NAME \
            --region=$REGION \
            --project=$PROJECT_ID \
            --wait

      - name: Log success summary
        if: success()
        run: |
          echo "### Pipeline completed successfully" >> $GITHUB_STEP_SUMMARY
          echo "- **Completed at:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- **Rainfall year:** ${{ github.event.inputs.year || '2024' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Rainfall month:** ${{ github.event.inputs.month || '6' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **GCS bucket:** gs://$GCS_BUCKET" >> $GITHUB_STEP_SUMMARY
          echo "- **Live map:** https://floodwatch.geobuildersafrica.com" >> $GITHUB_STEP_SUMMARY

      - name: Log failure summary
        if: failure()
        run: |
          echo "### Pipeline FAILED" >> $GITHUB_STEP_SUMMARY
          echo "- **Failed at:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- **Check Cloud Run logs:** https://console.cloud.google.com/run/jobs?project=$PROJECT_ID" >> $GITHUB_STEP_SUMMARY
